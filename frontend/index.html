<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>TRUSTRA CAPITAL | Automated Wealth Terminal</title>
    <meta name="description" content="Secure Institutional Grade Wealth Management Terminal" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,900;1,400;1,900&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <script>
      window.global = window;
      window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <style>
      :root {
        --terminal-bg: #020408;
      }
      body {
        margin: 0;
        background-color: var(--terminal-bg);
        color: #ffffff;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      /* Loading Pulse for Initial Handshake */
      #root:empty {
        background: var(--terminal-bg);
        height: 100vh;
        width: 100vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #root:empty::after {
        content: "";
        width: 40px;
        height: 40px;
        border: 2px solid rgba(234, 179, 8, 0.1);
        border-top-color: #EAB308;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
