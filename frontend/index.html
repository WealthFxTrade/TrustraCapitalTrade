<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Trustra Capital | Institutional Crypto Investment Platform</title>
    <meta name="description" content="Automated Wealth Terminal for Institutional Crypto Investment" />

    <script>
      // Safe polyfills
      window.global = window;
      window.process = {
        env: { 
          NODE_ENV: import.meta.env?.MODE || 'development'
        },
        browser: true,
        nextTick: (cb) => setTimeout(cb, 0)
      };
    </script>

    <style>
      :root {
        --terminal-bg: #020408;
        --accent: #EAB308;
      }

      body {
        margin: 0;
        background: var(--terminal-bg);
        color: #fff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow-x: hidden;
      }

      /* Enhanced Loading Spinner */
      #root:empty {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
      }

      #root:empty::after {
        content: "";
        width: 48px;
        height: 48px;
        border: 3px solid rgba(234, 179, 8, 0.15);
        border-top-color: #EAB308;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      #root:empty::before {
        content: "Trustra Capital";
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #EAB308;
        font-size: 1.1rem;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
