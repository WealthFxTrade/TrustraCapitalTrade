<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRUSTRA CAPITAL | Automated Wealth Terminal</title>
    
    <script>
      window.global = window;
      window.process = { 
        env: { NODE_ENV: 'development' },
        browser: true,
        version: '',
        nextTick: (cb) => setTimeout(cb, 0)
      };
    </script>

    <style>
      :root { --terminal-bg: #020408; }
      body { margin: 0; background: var(--terminal-bg); color: #fff; overflow-x: hidden; }
      #root:empty { height: 100vh; display: flex; align-items: center; justify-content: center; }
      #root:empty::after {
        content: ""; width: 40px; height: 40px; border: 2px solid rgba(234, 179, 8, 0.1);
        border-top-color: #EAB308; border-radius: 50%; animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
